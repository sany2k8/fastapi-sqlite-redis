# =============================================================================
# FastAPI Application - Default Values
# =============================================================================

# -- Number of FastAPI pod replicas
replicaCount: 2

# -- FastAPI container image settings
image:
  repository: sany2k8/fastapi-sqlite-redis
  tag: "latest"
  pullPolicy: IfNotPresent

# -- Image pull secrets (for private registries)
imagePullSecrets: []

# -- Override the chart name
nameOverride: ""
fullnameOverride: ""

# -- Service Account
serviceAccount:
  create: true
  annotations: {}
  name: ""

# =============================================================================
# FastAPI Application Settings
# =============================================================================
app:
  # -- Application port inside the container
  port: 8000

  # -- Environment variables for the FastAPI container
  env:
    REDIS_HOST: "fastapi-app-redis-master"
    REDIS_PORT: "6379"

  # -- Resource requests and limits
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

  # -- Liveness probe: restarts the pod if the app becomes unresponsive
  livenessProbe:
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 10
    periodSeconds: 15
    timeoutSeconds: 3
    failureThreshold: 3
    successThreshold: 1

  # -- Readiness probe: removes the pod from service endpoints when not ready
  readinessProbe:
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3
    successThreshold: 1

  # -- Startup probe: gives the app time to start up before liveness kicks in
  startupProbe:
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 30

  # -- Pod annotations
  podAnnotations: {}

  # -- Pod labels
  podLabels: {}

  # -- Node selector constraints
  nodeSelector: {}

  # -- Tolerations for pod scheduling
  tolerations: []

  # -- Affinity rules for pod scheduling
  affinity: {}

  # -- Pod security context
  podSecurityContext:
    fsGroup: 1000

  # -- Container security context
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    readOnlyRootFilesystem: false
    allowPrivilegeEscalation: false

# =============================================================================
# Service Configuration
# =============================================================================
service:
  type: ClusterIP
  port: 80
  targetPort: 8000

# =============================================================================
# Ingress Configuration
# =============================================================================
ingress:
  enabled: false
  className: "nginx"
  annotations: {}
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: fastapi.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: fastapi-tls
  #    hosts:
  #      - fastapi.local

# =============================================================================
# Horizontal Pod Autoscaler
# =============================================================================
autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

# =============================================================================
# Persistent Volume for SQLite data
# =============================================================================
persistence:
  enabled: true
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 1Gi
  # -- Existing PVC name (leave empty to create a new one)
  existingClaim: ""

# =============================================================================
# Redis Sub-chart / Standalone Configuration
# =============================================================================
redis:
  # -- Deploy Redis as part of this chart
  enabled: true

  image:
    repository: redis
    tag: "7-alpine"
    pullPolicy: IfNotPresent

  replicas: 1

  port: 6379

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

  persistence:
    enabled: true
    storageClass: ""
    accessMode: ReadWriteOnce
    size: 1Gi

  # -- Liveness probe for Redis
  livenessProbe:
    exec:
      command:
        - redis-cli
        - ping
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3

  # -- Readiness probe for Redis
  readinessProbe:
    exec:
      command:
        - redis-cli
        - ping
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3
