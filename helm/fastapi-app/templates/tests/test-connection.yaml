apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "fastapi-app.fullname" . }}-test-connection"
  labels:
    {{- include "fastapi-app.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  containers:
    - name: wget
      image: busybox:1.36
      command: ['wget']
      args: ['{{ include "fastapi-app.fullname" . }}:{{ .Values.service.port }}/health', '-O-', '-q']
  restartPolicy: Never
