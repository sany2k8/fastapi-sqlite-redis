{{- if .Values.redis.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "fastapi-app.redis.fullname" . }}
  labels:
    {{- include "fastapi-app.redis.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.redis.port }}
      targetPort: redis
      protocol: TCP
      name: redis
  selector:
    {{- include "fastapi-app.redis.selectorLabels" . | nindent 4 }}
{{- end }}
